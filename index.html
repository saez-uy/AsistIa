<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Riego hoy?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-deep:   #2d5a27;
      --green-mid:    #4a7c59;
      --green-light:  #7ab648;
      --earth-dark:   #8b6914;
      --earth-light:  #c4a35a;
      --beige:        #f5f0e8;
      --beige-dark:   #e8e0d0;
      --sky:          #87ceeb;
      --sky-dark:     #5ba3c9;
      --white:        #ffffff;
      --text-dark:    #1a2e1a;
      --text-mid:     #3d5c3d;
      --text-muted:   #7a9a7a;
      --radius-lg:    18px;
      --radius-md:    12px;
      --radius-sm:    8px;
      --shadow-soft:  0 4px 24px rgba(45,90,39,0.12);
      --shadow-card:  0 8px 40px rgba(45,90,39,0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--beige);
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Animated background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg,
          #e8f4e8 0%,
          #f0ede4 55%,
          #d4e8c8 70%,
          #2d5a27 100%
        );
      z-index: -2;
    }

    /* animated water/grass waves at bottom */
    .bg-waves {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      z-index: -1;
      overflow: hidden;
    }
    .bg-waves svg {
      position: absolute;
      bottom: 0;
      width: 200%;
      animation: waveDrift 8s linear infinite;
    }
    .bg-waves svg:nth-child(2) {
      opacity: 0.5;
      animation-duration: 12s;
      animation-direction: reverse;
    }
    @keyframes waveDrift {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ── Layout ── */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 16px 120px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 36px 16px 24px;
    }
    header .app-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
      animation: sway 4s ease-in-out infinite;
    }
    @keyframes sway {
      0%, 100% { transform: rotate(-3deg); }
      50%       { transform: rotate(3deg); }
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      color: var(--green-deep);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    header p.subtitle {
      margin-top: 6px;
      font-size: 0.95rem;
      color: var(--text-mid);
      font-weight: 300;
    }

    /* ── Cards ── */
    .card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(74,124,89,0.1);
    }
    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* ── Location / Manual search ── */
    #location-section .location-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text-mid);
    }
    .manual-search {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .manual-search input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--beige-dark);
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .manual-search input:focus { border-color: var(--green-mid); }
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-green {
      background: var(--green-deep);
      color: var(--white);
    }
    .btn-green:hover { background: var(--green-mid); transform: translateY(-1px); }
    .btn-green:active { transform: translateY(0); }
    .btn-outline {
      background: transparent;
      color: var(--green-deep);
      border: 2px solid var(--green-deep);
    }
    .btn-outline:hover { background: var(--green-deep); color: var(--white); }

    /* ── Loading ── */
    #loading-section {
      text-align: center;
      padding: 48px 24px;
    }
    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid var(--beige-dark);
      border-top-color: var(--green-mid);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-section p { color: var(--text-mid); font-size: 0.95rem; }

    /* ── Error ── */
    .error-msg {
      background: #fff3f3;
      border: 1.5px solid #f5c0c0;
      color: #c0392b;
      padding: 14px 18px;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    /* ── Verdict card ── */
    #verdict-card {
      text-align: center;
      padding: 36px 24px;
      transition: background 0.4s, box-shadow 0.4s;
    }
    #verdict-card.verdict-no {
      background: linear-gradient(135deg, #1a4a7a 0%, #2d6fa3 100%);
      color: white;
    }
    #verdict-card.verdict-opcional {
      background: linear-gradient(135deg, #7a5e0a 0%, #c4a035 100%);
      color: white;
    }
    #verdict-card.verdict-si {
      background: linear-gradient(135deg, #2d5a27 0%, #4a9c3a 100%);
      color: white;
    }
    #verdict-card.verdict-urgente {
      background: linear-gradient(135deg, #7a2000 0%, #d4500a 100%);
      color: white;
    }
    .verdict-icon {
      font-size: 72px;
      display: block;
      margin-bottom: 12px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    }
    .verdict-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 10px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .verdict-subtitle {
      font-size: 1.05rem;
      font-weight: 300;
      opacity: 0.9;
      margin-bottom: 16px;
    }
    .verdict-score {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 4px 16px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* ── "¿Por qué?" collapsible ── */
    .collapse-toggle {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--green-deep);
      padding: 0;
    }
    .collapse-toggle .chevron {
      transition: transform 0.3s;
      font-size: 0.8rem;
    }
    .collapse-toggle.open .chevron { transform: rotate(180deg); }
    .collapse-body {
      display: none;
      margin-top: 14px;
    }
    .collapse-body.open { display: block; }
    .factor-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--beige-dark);
      font-size: 0.88rem;
    }
    .factor-row:last-child { border-bottom: none; }
    .factor-name { color: var(--text-mid); flex: 1; }
    .factor-pts {
      font-weight: 600;
      font-size: 0.9rem;
      min-width: 52px;
      text-align: right;
    }
    .factor-pts.pos { color: #c0392b; }
    .factor-pts.neg { color: #1a7a4a; }
    .factor-pts.zero { color: var(--text-muted); }

    /* ── Weather panel ── */
    .weather-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }
    .weather-item {
      background: var(--beige);
      border-radius: var(--radius-md);
      padding: 14px 12px;
      text-align: center;
    }
    .weather-item .w-icon { font-size: 28px; display: block; margin-bottom: 6px; }
    .weather-item .w-value {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--green-deep);
    }
    .weather-item .w-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Precipitation bar ── */
    .precip-section { margin-top: 18px; }
    .precip-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .precip-bar-wrap {
      background: var(--beige-dark);
      border-radius: 6px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .precip-bar-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--sky-dark), var(--sky));
      transition: width 0.6s ease;
    }
    .precip-value {
      font-size: 0.82rem;
      color: var(--text-mid);
      text-align: right;
    }

    /* ── Historial de riegos ── */
    #historial-list {
      list-style: none;
      max-height: 220px;
      overflow-y: auto;
    }
    #historial-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--beige-dark);
      font-size: 0.88rem;
      color: var(--text-mid);
    }
    #historial-list li:last-child { border-bottom: none; }
    #historial-list li .date-txt { font-weight: 500; }
    #historial-list li .ago-txt { font-size: 0.78rem; color: var(--text-muted); }
    .empty-msg {
      color: var(--text-muted);
      font-size: 0.88rem;
      font-style: italic;
      text-align: center;
      padding: 12px 0;
    }

    /* ── Register button ── */
    .btn-register {
      width: 100%;
      padding: 16px;
      font-size: 1rem;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--green-deep), var(--green-mid));
      color: white;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(45,90,39,0.3);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-register:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(45,90,39,0.35); }
    .btn-register:active { transform: translateY(0); }
    .btn-register .reg-icon { font-size: 1.3rem; }

    /* ── Consultas historial ── */
    #consultas-list {
      list-style: none;
    }
    #consultas-list li {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 9px 0;
      border-bottom: 1px solid var(--beige-dark);
      font-size: 0.85rem;
      gap: 8px;
    }
    #consultas-list li:last-child { border-bottom: none; }
    .consult-date { color: var(--text-muted); font-size: 0.78rem; white-space: nowrap; }
    .consult-loc { color: var(--text-mid); font-size: 0.82rem; flex: 1; }
    .consult-verdict {
      font-weight: 600;
      font-size: 0.82rem;
      white-space: nowrap;
    }
    .cv-no       { color: #2d6fa3; }
    .cv-opcional { color: #c4a035; }
    .cv-si       { color: #2d8a27; }
    .cv-urgente  { color: #d4500a; }

    /* ── Footer info ── */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .info-row span { font-size: 0.82rem; color: var(--text-muted); }

    /* ── Hidden helper ── */
    .hidden { display: none !important; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .weather-grid { grid-template-columns: repeat(2, 1fr); }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>

<!-- Animated background waves -->
<div class="bg-waves">
  <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,40 C180,80 360,0 540,40 C720,80 900,0 1080,40 C1260,80 1440,20 1440,40 L1440,80 L0,80 Z" fill="#2d5a27" opacity="0.7"/>
  </svg>
  <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,50 C200,10 400,70 600,50 C800,30 1000,70 1200,50 C1300,38 1380,55 1440,50 L1440,80 L0,80 Z" fill="#4a7c59" opacity="0.5"/>
  </svg>
</div>

<div class="container">

  <!-- ── Header ── -->
  <header>
    <span class="app-icon">🌿</span>
    <h1>¿Riego hoy?</h1>
    <p class="subtitle">Decisión inteligente de riego para tu jardín</p>
  </header>

  <!-- ── Error global ── -->
  <div id="error-global" class="error-msg hidden"></div>

  <!-- ── Loading ── -->
  <div id="loading-section" class="card">
    <div class="spinner"></div>
    <p id="loading-msg">Obteniendo tu ubicación...</p>
  </div>

  <!-- ── Location fallback (manual city input) ── -->
  <div id="location-section" class="card hidden">
    <div class="card-title">Ubicación</div>
    <p style="font-size:0.9rem;color:var(--text-mid);margin-bottom:10px;">
      No pudimos obtener tu ubicación automáticamente. Ingresá tu ciudad:
    </p>
    <div class="manual-search">
      <input id="city-input" type="text" placeholder="Ej: Buenos Aires" autocomplete="off" />
      <button class="btn btn-green" onclick="searchCity()">Buscar</button>
    </div>
    <div id="city-error" class="hidden" style="color:#c0392b;font-size:0.85rem;margin-top:8px;"></div>
  </div>

  <!-- ── Verdict card ── -->
  <div id="verdict-card" class="card hidden">
    <span id="verdict-icon" class="verdict-icon">🌱</span>
    <div id="verdict-text" class="verdict-text">—</div>
    <div id="verdict-subtitle" class="verdict-subtitle">—</div>
    <span id="verdict-score" class="verdict-score">Puntuación: 0</span>
  </div>

  <!-- ── ¿Por qué? ── -->
  <div id="why-card" class="card hidden">
    <button class="collapse-toggle" onclick="toggleCollapse(this)">
      🔍 ¿Por qué esta recomendación?
      <span class="chevron">▼</span>
    </button>
    <div class="collapse-body">
      <div id="factors-list"></div>
    </div>
  </div>

  <!-- ── Weather data ── -->
  <div id="weather-card" class="card hidden">
    <div class="card-title">Condiciones actuales</div>
    <div class="weather-grid" id="weather-grid"></div>
    <div class="precip-section" id="precip-section"></div>
  </div>

  <!-- ── Register watering button ── -->
  <div id="register-section" class="hidden">
    <button class="btn-register" onclick="registerWatering()">
      <span class="reg-icon">💧</span>
      Registré el riego hoy
    </button>
  </div>

  <!-- ── Historial de riegos ── -->
  <div id="historial-card" class="card hidden">
    <div class="card-title">Historial de riegos</div>
    <ul id="historial-list"></ul>
    <div id="historial-empty" class="empty-msg hidden">Ningún riego registrado todavía.</div>
  </div>

  <!-- ── Consultas historial ── -->
  <div id="consultas-card" class="card hidden">
    <div class="card-title">Últimas consultas</div>
    <ul id="consultas-list"></ul>
  </div>

  <!-- ── Info row ── -->
  <div id="info-row" class="card hidden" style="padding:14px 20px;">
    <div class="info-row">
      <span id="last-query-txt">—</span>
      <button class="btn btn-outline" onclick="refresh()" style="padding:7px 14px;font-size:0.82rem;">↺ Actualizar</button>
    </div>
  </div>

</div><!-- /container -->

<script>
/* =====================================================================
   ¿Riego hoy? — Scoring & data engine
   ===================================================================== */

// ── State ──
let currentLat = null;
let currentLon = null;
let currentLocation = 'Desconocida';

// ── localStorage helpers ──
const LS_RIEGO    = 'riegoHistorial';
const LS_CONSULTAS = 'consultasHistorial';

function getRiegosHistorial() {
  try { return JSON.parse(localStorage.getItem(LS_RIEGO) || '[]'); } catch { return []; }
}
function saveRiegosHistorial(arr) {
  localStorage.setItem(LS_RIEGO, JSON.stringify(arr));
}
function getConsultasHistorial() {
  try { return JSON.parse(localStorage.getItem(LS_CONSULTAS) || '[]'); } catch { return []; }
}
function saveConsultasHistorial(arr) {
  localStorage.setItem(LS_CONSULTAS, JSON.stringify(arr.slice(-10)));
}

// ── UI helpers ──
function show(id)  { document.getElementById(id).classList.remove('hidden'); }
function hide(id)  { document.getElementById(id).classList.add('hidden'); }
function setLoading(msg) {
  show('loading-section');
  document.getElementById('loading-msg').textContent = msg;
}
function showGlobalError(msg) {
  const el = document.getElementById('error-global');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function clearGlobalError() {
  document.getElementById('error-global').classList.add('hidden');
}

// ── Collapse toggle ──
function toggleCollapse(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

// ── Date utils ──
function toDateStr(d) {
  // Returns YYYY-MM-DD in local time
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function daysAgo(dateStr) {
  const today = toDateStr(new Date());
  const ms = new Date(today) - new Date(dateStr);
  return Math.round(ms / 86400000);
}
function friendlyDate(isoStr) {
  const d = new Date(isoStr);
  return d.toLocaleDateString('es-AR', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}
function relativeTime(isoStr) {
  const diff = daysAgo(toDateStr(new Date(isoStr)));
  if (diff === 0) return 'hoy';
  if (diff === 1) return 'ayer';
  return `hace ${diff} días`;
}

// ── Southern-hemisphere season ──
function getSeason(month) {
  // month 0-indexed: 11=Dec,0=Jan,1=Feb → summer; 5=Jun,6=Jul,7=Aug → winter
  if ([11, 0, 1].includes(month)) return 'summer';
  if ([5, 6, 7].includes(month)) return 'winter';
  return 'other';
}

/* =====================================================================
   SCORING ENGINE
   Returns { score, factors[] }
   factors: [{ name, points, triggered }]
   ===================================================================== */
function computeScore(weather, riegosHistorial) {
  const factors = [];
  let score = 0;

  // Shortcuts
  const temp       = weather.current.temperature_2m;
  const humidity   = weather.current.relative_humidity_2m;
  const windSpeed  = weather.current.wind_speed_10m;
  const weatherCode = weather.current.weather_code;
  const precip24h  = weather.precip24h;   // mm in last 24h
  const precip48h  = weather.precip48h;   // mm in last 48h
  const precip7d   = weather.precip7d;    // mm in last 7 days
  const daysSinceRain = weather.daysSinceRain; // days since last rain event
  const rainProb24h = weather.rainProb24h; // % probability next 24h
  const rainProb48h = weather.rainProb48h; // % probability next 48h
  const month      = new Date().getMonth();
  const season     = getSeason(month);

  // ── NEGATIVE factors (reduce irrigation need) ──

  // Rained in last 24h
  if (precip24h > 0) {
    score -= 30;
    factors.push({ name: 'Llovió en las últimas 24 h', points: -30, triggered: true });
  } else {
    factors.push({ name: 'Llovió en las últimas 24 h', points: 0, triggered: false });
  }

  // Accumulated rain last 48h > 5mm
  if (precip48h > 5) {
    score -= 20;
    factors.push({ name: `Lluvia acumulada 48 h > 5 mm (${precip48h.toFixed(1)} mm)`, points: -20, triggered: true });
  } else {
    factors.push({ name: `Lluvia acumulada 48 h (${precip48h.toFixed(1)} mm)`, points: 0, triggered: false });
  }

  // Accumulated rain last 7 days > 20mm
  if (precip7d > 20) {
    score -= 15;
    factors.push({ name: `Lluvia acumulada 7 días > 20 mm (${precip7d.toFixed(1)} mm)`, points: -15, triggered: true });
  } else {
    factors.push({ name: `Lluvia acumulada 7 días (${precip7d.toFixed(1)} mm)`, points: 0, triggered: false });
  }

  // Rain probability next 24h > 60%
  if (rainProb24h > 60) {
    score -= 25;
    factors.push({ name: `Probabilidad de lluvia próx. 24 h: ${rainProb24h}%`, points: -25, triggered: true });
  } else {
    factors.push({ name: `Probabilidad de lluvia próx. 24 h: ${rainProb24h}%`, points: 0, triggered: false });
  }

  // Relative humidity > 80%
  if (humidity > 80) {
    score -= 10;
    factors.push({ name: `Humedad alta: ${humidity}%`, points: -10, triggered: true });
  } else {
    factors.push({ name: `Humedad relativa: ${humidity}%`, points: 0, triggered: false });
  }

  // Temperature < 10°C
  if (temp < 10) {
    score -= 20;
    factors.push({ name: `Temperatura baja: ${temp.toFixed(1)}°C`, points: -20, triggered: true });
  } else {
    factors.push({ name: `Temperatura: ${temp.toFixed(1)}°C`, points: 0, triggered: false });
  }

  // Winter season (southern hemisphere: June–August)
  if (season === 'winter') {
    score -= 15;
    factors.push({ name: 'Invierno (hemisferio sur)', points: -15, triggered: true });
  } else {
    factors.push({ name: 'Estación del año', points: 0, triggered: false });
  }

  // Cloudy sky (weather_code >= 3)
  if (weatherCode >= 3) {
    score -= 5;
    factors.push({ name: `Cielo nublado (código: ${weatherCode})`, points: -5, triggered: true });
  } else {
    factors.push({ name: `Cielo despejado (código: ${weatherCode})`, points: 0, triggered: false });
  }

  // ── POSITIVE factors (increase irrigation need) ──

  // No rain in last 5 days
  if (daysSinceRain >= 5) {
    score += 30;
    factors.push({ name: `Sin lluvia hace ≥ 5 días (${daysSinceRain} días)`, points: +30, triggered: true });
  } else if (daysSinceRain >= 3) {
    // No rain in last 3 days (but rained within 5)
    score += 15;
    factors.push({ name: `Sin lluvia hace ≥ 3 días (${daysSinceRain} días)`, points: +15, triggered: true });
  } else {
    factors.push({ name: `Días sin lluvia: ${daysSinceRain}`, points: 0, triggered: false });
  }

  // Temperature > 28°C
  if (temp > 35) {
    score += 35; // +20 base +15 extra
    factors.push({ name: `Temperatura muy alta: ${temp.toFixed(1)}°C (> 35°C)`, points: +35, triggered: true });
  } else if (temp > 28) {
    score += 20;
    factors.push({ name: `Temperatura alta: ${temp.toFixed(1)}°C (> 28°C)`, points: +20, triggered: true });
  } else {
    factors.push({ name: `Temperatura moderada: ${temp.toFixed(1)}°C`, points: 0, triggered: false });
  }

  // Humidity < 40%
  if (humidity < 40) {
    score += 20;
    factors.push({ name: `Humedad muy baja: ${humidity}%`, points: +20, triggered: true });
  } else {
    factors.push({ name: `Humedad relativa (impacto): ${humidity}%`, points: 0, triggered: false });
  }

  // Strong wind > 30 km/h
  if (windSpeed > 30) {
    score += 10;
    factors.push({ name: `Viento fuerte: ${windSpeed.toFixed(0)} km/h`, points: +10, triggered: true });
  } else {
    factors.push({ name: `Viento: ${windSpeed.toFixed(0)} km/h`, points: 0, triggered: false });
  }

  // Summer season (December–February)
  if (season === 'summer') {
    score += 15;
    factors.push({ name: 'Verano (hemisferio sur)', points: +15, triggered: true });
  }

  // No rain expected next 48h
  if (rainProb48h < 20) {
    score += 15;
    factors.push({ name: `Sin lluvia esperada próx. 48 h (prob.: ${rainProb48h}%)`, points: +15, triggered: true });
  } else {
    factors.push({ name: `Probabilidad de lluvia próx. 48 h: ${rainProb48h}%`, points: 0, triggered: false });
  }

  // ── Days since last manual watering ──
  const riegos = riegosHistorial.filter(r => r.date);
  let lastWateredDays = null;
  let wateredFactor = { name: 'Sin registro de riego manual', points: +10, triggered: true };

  if (riegos.length > 0) {
    // Find most recent
    const sorted = [...riegos].sort((a, b) => new Date(b.date) - new Date(a.date));
    lastWateredDays = daysAgo(sorted[0].date);

    if (lastWateredDays === 0) {
      score -= 40;
      wateredFactor = { name: 'Regaste hoy', points: -40, triggered: true };
    } else if (lastWateredDays === 1) {
      score -= 40;
      wateredFactor = { name: 'Regaste ayer', points: -40, triggered: true };
    } else if (lastWateredDays === 2) {
      score -= 20;
      wateredFactor = { name: `Último riego: hace ${lastWateredDays} días`, points: -20, triggered: true };
    } else if (lastWateredDays === 3) {
      wateredFactor = { name: `Último riego: hace ${lastWateredDays} días`, points: 0, triggered: false };
    } else if (lastWateredDays === 4) {
      score += 20;
      wateredFactor = { name: `Último riego: hace ${lastWateredDays} días`, points: +20, triggered: true };
    } else {
      score += 40;
      wateredFactor = { name: `Último riego: hace ${lastWateredDays} días`, points: +40, triggered: true };
    }
  } else {
    score += 10;
  }
  factors.push(wateredFactor);

  return { score, factors, lastWateredDays };
}

/* =====================================================================
   VERDICT from score + override logic
   ===================================================================== */
function getVerdict(score, lastWateredDays) {
  // Override: watered today or yesterday → always "NO riegues"
  if (lastWateredDays !== null && lastWateredDays <= 1) {
    return {
      key: 'no',
      text: 'NO riegues',
      subtitle: 'El suelo está húmedo',
      icon: '🚫',
      cssClass: 'verdict-no'
    };
  }
  if (score < -20) {
    return { key: 'no',       text: 'NO riegues',      subtitle: 'El suelo está húmedo',          icon: '💧', cssClass: 'verdict-no' };
  } else if (score <= 20) {
    return { key: 'opcional', text: 'OPCIONAL',         subtitle: 'Observá el césped',             icon: '👁️', cssClass: 'verdict-opcional' };
  } else if (score <= 50) {
    return { key: 'si',       text: 'SÍ, riega hoy',   subtitle: 'Riego recomendado',              icon: '🌊', cssClass: 'verdict-si' };
  } else {
    return { key: 'urgente',  text: 'RIEGO URGENTE',   subtitle: 'Césped en estrés hídrico',       icon: '🔥', cssClass: 'verdict-urgente' };
  }
}

/* =====================================================================
   OPEN-METEO DATA FETCHING
   ===================================================================== */
async function fetchWeatherData(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast` +
    `?latitude=${lat}&longitude=${lon}` +
    `&current=temperature_2m,relative_humidity_2m,precipitation,weather_code,wind_speed_10m,dew_point_2m` +
    `&hourly=precipitation,precipitation_probability` +
    `&past_days=7&forecast_days=2&timezone=auto`;

  const res = await fetch(url);
  if (!res.ok) throw new Error(`Error de API (${res.status})`);
  const data = await res.json();

  // ── Parse hourly precipitation for past 7 days + forecast ──
  const hourlyTimes  = data.hourly.time;          // ISO strings
  const hourlyPrecip = data.hourly.precipitation; // mm/h
  const hourlyProb   = data.hourly.precipitation_probability; // %

  const now = new Date();
  const nowMs = now.getTime();

  // Helper: ms from ISO string
  const ms = iso => new Date(iso).getTime();

  // Last 24h precip
  const precip24h = hourlyPrecip
    .filter((_, i) => nowMs - ms(hourlyTimes[i]) <= 24 * 3600 * 1000 && ms(hourlyTimes[i]) <= nowMs)
    .reduce((a, b) => a + (b || 0), 0);

  // Last 48h precip
  const precip48h = hourlyPrecip
    .filter((_, i) => nowMs - ms(hourlyTimes[i]) <= 48 * 3600 * 1000 && ms(hourlyTimes[i]) <= nowMs)
    .reduce((a, b) => a + (b || 0), 0);

  // Last 7 days precip
  const precip7d = hourlyPrecip
    .filter((_, i) => nowMs - ms(hourlyTimes[i]) <= 7 * 24 * 3600 * 1000 && ms(hourlyTimes[i]) <= nowMs)
    .reduce((a, b) => a + (b || 0), 0);

  // Days since last rain event (any hour with precip > 0.1mm)
  let daysSinceRain = 7; // default: no rain in last 7d
  for (let i = hourlyTimes.length - 1; i >= 0; i--) {
    const t = ms(hourlyTimes[i]);
    if (t > nowMs) continue; // skip future
    if ((hourlyPrecip[i] || 0) > 0.1) {
      daysSinceRain = Math.floor((nowMs - t) / 86400000);
      break;
    }
  }

  // Rain probability next 24h: max probability in upcoming 24 hours
  const futureProbs24 = hourlyProb
    ? hourlyProb.filter((_, i) => ms(hourlyTimes[i]) > nowMs && ms(hourlyTimes[i]) <= nowMs + 24 * 3600 * 1000)
    : [];
  const rainProb24h = futureProbs24.length > 0 ? Math.max(...futureProbs24) : 0;

  // Rain probability next 48h
  const futureProbs48 = hourlyProb
    ? hourlyProb.filter((_, i) => ms(hourlyTimes[i]) > nowMs && ms(hourlyTimes[i]) <= nowMs + 48 * 3600 * 1000)
    : [];
  const rainProb48h = futureProbs48.length > 0 ? Math.max(...futureProbs48) : 0;

  return {
    current: data.current,
    precip24h,
    precip48h,
    precip7d,
    daysSinceRain,
    rainProb24h,
    rainProb48h
  };
}

/* =====================================================================
   GEOCODING (manual city search)
   ===================================================================== */
async function geocodeCity(city) {
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=es`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Error al buscar la ciudad');
  const data = await res.json();
  if (!data.results || data.results.length === 0) throw new Error('Ciudad no encontrada');
  const r = data.results[0];
  return {
    lat: r.latitude,
    lon: r.longitude,
    name: `${r.name}${r.admin1 ? ', ' + r.admin1 : ''}${r.country ? ', ' + r.country : ''}`
  };
}

/* =====================================================================
   RENDER FUNCTIONS
   ===================================================================== */

// Weather code → description
function weatherCodeDesc(code) {
  if (code === 0)           return 'Despejado';
  if (code <= 2)            return 'Parcialmente nublado';
  if (code === 3)           return 'Nublado';
  if (code <= 49)           return 'Niebla / neblina';
  if (code <= 57)           return 'Llovizna';
  if (code <= 67)           return 'Lluvia';
  if (code <= 77)           return 'Nieve';
  if (code <= 82)           return 'Chubascos';
  if (code <= 86)           return 'Nieve con viento';
  if (code >= 95)           return 'Tormenta';
  return `Código ${code}`;
}

function weatherCodeEmoji(code) {
  if (code === 0)  return '☀️';
  if (code <= 2)   return '⛅';
  if (code === 3)  return '☁️';
  if (code <= 49)  return '🌫️';
  if (code <= 67)  return '🌧️';
  if (code <= 77)  return '❄️';
  if (code <= 82)  return '🌦️';
  if (code >= 95)  return '⛈️';
  return '🌡️';
}

function renderVerdict(verdict, score) {
  const card = document.getElementById('verdict-card');
  // Remove old verdict classes
  card.classList.remove('verdict-no','verdict-opcional','verdict-si','verdict-urgente');
  card.classList.add(verdict.cssClass);
  document.getElementById('verdict-icon').textContent    = verdict.icon;
  document.getElementById('verdict-text').textContent    = verdict.text;
  document.getElementById('verdict-subtitle').textContent = verdict.subtitle;
  document.getElementById('verdict-score').textContent   = `Puntuación: ${score > 0 ? '+' : ''}${score}`;
  show('verdict-card');
}

function renderFactors(factors) {
  const container = document.getElementById('factors-list');
  container.innerHTML = '';
  // Show only triggered factors (+ a separator for summary)
  const triggered = factors.filter(f => f.triggered);
  const notTriggered = factors.filter(f => !f.triggered);

  const allToShow = [...triggered];
  allToShow.forEach(f => {
    const row = document.createElement('div');
    row.className = 'factor-row';
    const ptsClass = f.points > 0 ? 'pos' : f.points < 0 ? 'neg' : 'zero';
    const ptsLabel = f.points > 0 ? `+${f.points}` : `${f.points}`;
    row.innerHTML = `<span class="factor-name">${f.name}</span>
                     <span class="factor-pts ${ptsClass}">${ptsLabel}</span>`;
    container.appendChild(row);
  });

  if (notTriggered.length > 0) {
    const sep = document.createElement('div');
    sep.style.cssText = 'font-size:0.78rem;color:var(--text-muted);margin:10px 0 4px;font-style:italic;';
    sep.textContent = 'Sin efecto:';
    container.appendChild(sep);
    notTriggered.forEach(f => {
      const row = document.createElement('div');
      row.className = 'factor-row';
      row.style.opacity = '0.55';
      row.innerHTML = `<span class="factor-name">${f.name}</span>
                       <span class="factor-pts zero">0</span>`;
      container.appendChild(row);
    });
  }

  show('why-card');
}

function renderWeather(weather) {
  const grid = document.getElementById('weather-grid');
  const c = weather.current;
  grid.innerHTML = `
    <div class="weather-item">
      <span class="w-icon">🌡️</span>
      <div class="w-value">${c.temperature_2m.toFixed(1)}°C</div>
      <div class="w-label">Temperatura</div>
    </div>
    <div class="weather-item">
      <span class="w-icon">💧</span>
      <div class="w-value">${c.relative_humidity_2m}%</div>
      <div class="w-label">Humedad</div>
    </div>
    <div class="weather-item">
      <span class="w-icon">💨</span>
      <div class="w-value">${c.wind_speed_10m.toFixed(0)} km/h</div>
      <div class="w-label">Viento</div>
    </div>
    <div class="weather-item">
      <span class="w-icon">${weatherCodeEmoji(c.weather_code)}</span>
      <div class="w-value" style="font-size:0.95rem">${weatherCodeDesc(c.weather_code)}</div>
      <div class="w-label">Cielo</div>
    </div>
    <div class="weather-item">
      <span class="w-icon">🌡️</span>
      <div class="w-value">${c.dew_point_2m.toFixed(1)}°C</div>
      <div class="w-label">Punto de rocío</div>
    </div>
    <div class="weather-item">
      <span class="w-icon">☔</span>
      <div class="w-value">${c.precipitation.toFixed(1)} mm</div>
      <div class="w-label">Precip. actual</div>
    </div>
  `;

  // Precipitation bars
  const precipSection = document.getElementById('precip-section');
  const max7d = Math.max(weather.precip7d, 30); // scale
  precipSection.innerHTML = `
    <div class="precip-label">Lluvia acumulada (últimos días)</div>
    ${makePrecipBar('Últimas 24 h', weather.precip24h, Math.max(weather.precip7d,10))}
    ${makePrecipBar('Últimas 48 h', weather.precip48h, Math.max(weather.precip7d,10))}
    ${makePrecipBar('Últimos 7 días', weather.precip7d, max7d)}
    <div class="precip-label" style="margin-top:12px;">Probabilidad de lluvia (próximas horas)</div>
    ${makePrecipBar('Próximas 24 h', weather.rainProb24h, 100, '%')}
    ${makePrecipBar('Próximas 48 h', weather.rainProb48h, 100, '%')}
  `;

  show('weather-card');
}

function makePrecipBar(label, value, max, unit = 'mm') {
  const pct = Math.min(100, (value / max) * 100);
  return `
    <div style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">
        <span style="font-size:0.8rem;color:var(--text-mid);">${label}</span>
        <span class="precip-value">${value.toFixed(unit === '%' ? 0 : 1)} ${unit}</span>
      </div>
      <div class="precip-bar-wrap">
        <div class="precip-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>
  `;
}

function renderHistorial() {
  const riegos = getRiegosHistorial();
  const list = document.getElementById('historial-list');
  const empty = document.getElementById('historial-empty');
  list.innerHTML = '';

  if (riegos.length === 0) {
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    // Sort descending
    const sorted = [...riegos].sort((a, b) => new Date(b.date) - new Date(a.date));
    sorted.slice(0, 20).forEach(r => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="date-txt">${friendlyDate(r.date)}</span>
                      <span class="ago-txt">${relativeTime(r.date)}</span>`;
      list.appendChild(li);
    });
  }
  show('historial-card');
}

function renderConsultasHistorial() {
  const consultas = getConsultasHistorial();
  const list = document.getElementById('consultas-list');
  list.innerHTML = '';

  if (consultas.length === 0) return;

  const cvClass = { no: 'cv-no', opcional: 'cv-opcional', si: 'cv-si', urgente: 'cv-urgente' };
  const sorted = [...consultas].reverse();
  sorted.forEach(c => {
    const li = document.createElement('li');
    li.innerHTML = `
      <div>
        <div class="consult-loc">${c.location}</div>
        <div class="consult-date">${new Date(c.date).toLocaleString('es-AR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })}</div>
      </div>
      <span class="consult-verdict ${cvClass[c.verdictKey] || ''}">${c.verdict}</span>
    `;
    list.appendChild(li);
  });

  show('consultas-card');
}

/* =====================================================================
   MAIN FLOW
   ===================================================================== */
async function runAnalysis(lat, lon, locationName) {
  currentLat = lat;
  currentLon = lon;
  currentLocation = locationName;

  // Hide manual location UI, show loading
  hide('location-section');
  setLoading('Descargando datos del clima...');
  clearGlobalError();

  try {
    const weather = await fetchWeatherData(lat, lon);

    hide('loading-section');

    // Scoring
    const riegos = getRiegosHistorial();
    const { score, factors, lastWateredDays } = computeScore(weather, riegos);
    const verdict = getVerdict(score, lastWateredDays);

    // Render all panels
    renderVerdict(verdict, score);
    renderFactors(factors);
    renderWeather(weather);
    renderHistorial();
    show('register-section');

    // Save query to history
    const consultas = getConsultasHistorial();
    consultas.push({
      date: new Date().toISOString(),
      score,
      verdict: verdict.text,
      verdictKey: verdict.key,
      location: locationName
    });
    saveConsultasHistorial(consultas);
    renderConsultasHistorial();

    // Info row
    document.getElementById('last-query-txt').textContent =
      `Última actualización: ${new Date().toLocaleTimeString('es-AR')} — ${locationName}`;
    show('info-row');

  } catch (err) {
    hide('loading-section');
    showGlobalError(`No se pudieron obtener los datos del clima: ${err.message}`);
    show('location-section');
  }
}

/* =====================================================================
   GEOLOCATION
   ===================================================================== */
function startWithGeolocation() {
  if (!navigator.geolocation) {
    hide('loading-section');
    show('location-section');
    return;
  }
  setLoading('Obteniendo tu ubicación...');
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      // Reverse geocode using Open-Meteo (we'll just show coords)
      reverseGeocode(lat, lon).then(name => {
        runAnalysis(lat, lon, name);
      });
    },
    _err => {
      // Geolocation denied or unavailable → show manual input
      hide('loading-section');
      show('location-section');
    },
    { timeout: 10000 }
  );
}

async function reverseGeocode(lat, lon) {
  // Open-Meteo doesn't have reverse geocoding; use approximate label
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=es`;
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (res.ok) {
      const data = await res.json();
      const addr = data.address || {};
      return addr.city || addr.town || addr.village || addr.county || `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
    }
  } catch {}
  return `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
}

/* =====================================================================
   MANUAL CITY SEARCH
   ===================================================================== */
async function searchCity() {
  const input = document.getElementById('city-input');
  const errEl = document.getElementById('city-error');
  const city = input.value.trim();
  if (!city) {
    errEl.textContent = 'Ingresá el nombre de una ciudad.';
    errEl.classList.remove('hidden');
    return;
  }
  errEl.classList.add('hidden');
  setLoading(`Buscando "${city}"...`);
  show('loading-section');
  hide('location-section');

  try {
    const { lat, lon, name } = await geocodeCity(city);
    await runAnalysis(lat, lon, name);
  } catch (err) {
    hide('loading-section');
    show('location-section');
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
}

/* =====================================================================
   REGISTER WATERING
   ===================================================================== */
function registerWatering() {
  const today = toDateStr(new Date());
  const riegos = getRiegosHistorial();

  // Avoid duplicate for today
  if (riegos.some(r => r.date === today)) {
    alert('Ya registraste el riego de hoy 🌿');
    return;
  }

  riegos.push({ date: today });
  saveRiegosHistorial(riegos);

  // Re-run analysis with updated data
  if (currentLat !== null) {
    runAnalysis(currentLat, currentLon, currentLocation);
  } else {
    renderHistorial();
  }
}

/* =====================================================================
   REFRESH
   ===================================================================== */
function refresh() {
  if (currentLat !== null) {
    runAnalysis(currentLat, currentLon, currentLocation);
  } else {
    // Restart full flow
    hide('verdict-card');
    hide('why-card');
    hide('weather-card');
    hide('register-section');
    hide('info-row');
    hide('location-section');
    startWithGeolocation();
  }
}

/* =====================================================================
   ENTER key for city input
   ===================================================================== */
document.getElementById('city-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchCity();
});

/* =====================================================================
   BOOT
   ===================================================================== */
// Render existing query history on load
renderConsultasHistorial();
renderHistorial();
startWithGeolocation();
</script>
